# Ensemble 第二层 (Stacking) 模型训练配置
# 使用融合数据（exp30 + exp33 预测）训练第二层 Transformer 模型

# ============================================================================
# 📊 数据设置
# ============================================================================
data:
  dataset: 'ensemble'  # 数据集类型（集成学习专用）
  appliance: 'fridge'  # 目标电器设备（将被命令行参数覆盖）
  data_path: 'data/redd.h5'  # HDF5 数据文件路径

  # 📌 融合数据参数
  # 输入：原始聚合功率序列 (N, 599)
  # 目标：融合预测值（第二层学习）
  window_size: 599  # 输入序列长度（保持与第一层一致）
  window_stride: 1  # 窗口滑动步长

  # 📌 训练/测试集划分
  train_buildings: [2 ,3, 4, 5, 6]  # 训练使用的建筑编号
  test_buildings: [1]         # 测试使用的建筑编号

  # 📌 数据归一化参数
  normalize: False  # 融合数据已归一化，无需再次归一化
  mean: 0.0
  std: 1.0

# ============================================================================
# 🔗 集成学习设置（第二层训练专用）
# ============================================================================
ensemble:
  # 📌 第一层模型配置
  model1:
    name: 'seq2point'  # 模型1类型
    checkpoint: 'runs/exp30/weights/best_metrics.pth'  # 模型1检查点路径
    alias: 'Seq2Point'  # 模型1别名（用于日志）

  model2:
    name: 'seq2point_lstm'  # 模型2类型
    checkpoint: 'runs/exp33/weights/best_metrics.pth'  # 模型2检查点路径
    alias: 'LSTM'  # 模型2别名（用于日志）

  # 📌 融合方法配置
  # 可选项：
  #   - average: 简单平均 (pred1 + pred2) / 2
  #   - weighted_average: 加权平均 w1*pred1 + w2*pred2
  #   - stack: 堆叠特征 [pred1, pred2] -> (N, 2)
  fusion_method: 'stack'  # 融合方法选择

  # 📌 加权平均的权重（仅当 fusion_method='weighted_average' 时使用）
  weights: [0.5, 0.5]  # [model1_weight, model2_weight]

  # 📌 融合数据缓存
  cache_dir: 'ensemble_data'  # 融合数据缓存目录
  use_cache: False  # 是否使用缓存（如果已生成过融合数据）- 设为 False 以重新生成

# ============================================================================
# 🤖 模型设置
# ============================================================================
model:
  name: 'stack'  # 模型名称（stack 方法会自动使用简单 FC 网络）
  input_size: 599  # 模型输入大小（原始聚合功率序列，stack 方法自动调整为 2）
  output_size: 1  # 模型输出大小（预测功率值）

  # 📌 Transformer 配置（第二层学习）
  # 注意：当使用 stack 融合方法时，会自动使用简单的 FC 网络
  # 以下参数仅用于 average/weighted_average 融合方法
  transformer:
    input_size: 599  # Transformer输入大小
    d_model: 48      # ⭐ 模型维度（比第一层小，融合任务更简单）
    nhead: 4         # 多头注意力头数
    num_layers: 2    # ⭐ Transformer编码层数（减少层数以加速训练）
    dim_feedforward: 96  # 前馈网络维度（比例调整）
    dropout_rate: 0.2   # Dropout比率（略低，防止过度正则化）

  # 📌 全连接网络配置（仅当 fusion_method='stack' 时使用）
  fc_network:
    input_size: 2
    output_size: 1
    # 简化隐藏层结构，避免过拟合
    hidden_layers: [128, 64, 32] 
    dropout_rate: 0.2  # Dropout比率（应用于每个隐藏层后）
    use_batchnorm: True # 使用批归一化，提高训练稳定性
    activation: 'relu' # 激活函数类型

# ============================================================================
# 🏋️ 训练设置
# ============================================================================
training:
  mode: 'single'  # 单模型训练模式
  batch_size: 512  # ⭐ 更大的批次（融合模型收敛更快）
  epochs: 200     # ⭐ 更少的轮次（融合学习通常收敛更快）
  learning_rate: 0.0001  # ⭐ 更小的学习率（微调能力）
  optimizer: 'adam'  # 优化器类型
  loss_function: 'mse'  # 损失函数

  # 📌 早停机制（防止过拟合）
  early_stopping: True  # 启用早停
  patience: 15   # ⭐ 更高的耐心（允许学习曲线波动）

  # 📌 学习率衰减策略
  lr_schedule: True  # 启用学习率衰减
  lr_decay_factor: 0.5  # 衰减因子
  lr_decay_patience: 8  # ⭐ 衰减耐心（更温和的衰减）

  # 📌 模型检查点保存设置
  save_best_only: False  # 保存所有版本以便对比
  save_frequency: 10     # 每 10 个 epoch 保存一次可视化

# ============================================================================
# ✅ 验证设置
# ============================================================================
validation:
  val_split: 0.2  # 验证集比例（用于生成融合数据时）
  shuffle: True  # 是否打乱数据顺序

# ============================================================================
# 📈 评估设置
# ============================================================================
evaluation:
  metrics: ['mae', 'mse', 'rmse', 'f1', 'accuracy']  # 评估指标
  threshold: 10  # 开关状态功率阈值（W）

# ============================================================================
# 📝 日志设置
# ============================================================================
logging:
  log_dir: 'logs'  # 日志输出目录
  tensorboard: True  # TensorBoard可视化
  save_predictions: True  # 保存预测结果

# ============================================================================
# 💻 设备设置
# ============================================================================
device:
  gpu: True      # 使用GPU加速
  gpu_id: 0      # GPU设备ID
  num_workers: 4  # 数据加载工作进程数

# ============================================================================
# 🎲 随机种子
# ============================================================================
seed: 42  # 随机数种子（用于复现结果）
