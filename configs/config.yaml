# Seq2Point NILM 配置文件
# Seq2Point 非侵入式负荷监测（NILM）模型的完整训练与评估配置

# ============================================================================
# 📊 数据设置
# ============================================================================
data:
  dataset: 'redd'  # 数据集选项：'redd' REDD数据集，'ukdale' UK-DALE数据集
  data_path: 'data/redd.h5'  # 数据文件路径
  appliance: 'fridge'  # 目标电器设备（冰箱）
  building: 1  # 建筑物编号
  
  # 📌 采样参数
  # REDD: 3秒采样周期，UK-DALE: 不同周期
  sampling_period: 1  # 采样周期（秒）：采样间隔
  window_size: 599  # 输入序列长度（样本数）：输入到模型的时间窗口宽度
  window_stride: 1  # 滑动窗口步长：相邻窗口的间隔
  
  # 💡 时间窗口计算说明
  # 时间窗口 = window_size × sampling_period
  # 599 样本 × 3秒 = 1797秒 ≈ 30 分钟的聚合功率数据
  
  train_buildings: [2,3,4,5,6]  # 训练集使用的建筑物ID（这些楼栋包含 fridge 通道）
  test_buildings: [1]  # 测试集使用的建筑物ID
  
  # 📌 数据归一化参数（z-score标准化）
  normalize: True  # 是否进行数据归一化
  mean: 0.0  # 归一化均值
  std: 1.0  # 归一化标准差

# ============================================================================
# 🤖 模型设置
# ============================================================================
model:
  name: 'seq2point'  # 模型类型：'seq2point' CNN模型，'seq2point_lstm' LSTM模型，'parallel' 并行模型
  input_size: 599  # 模型输入大小（样本数）
  output_size: 1  # 模型输出大小（预测功率值）
  dropout_rate: 0.2 # Dropout比率（防止过拟合）
  
  # 📌 并行模式子模型配置
  seq2point:
    input_size: 599  # CNN模型输入大小
    dropout_rate: 0.2  # CNN模型Dropout比率

  transformer:
    input_size: 599  # Transformer模型输入大小
    d_model: 128  # 模型维度
    nhead: 4  # 多头注意力头数
    num_layers: 4  # Transformer编码层数
    dim_feedforward: 256  # 前馈网络维度
    dropout_rate: 0.2  # Transformer Dropout比率
  
# ============================================================================
# 🏋️ 训练设置
# ============================================================================
training:
  mode: 'single'  # 训练模式：'single' 单模型，'parallel' 双模型并行
  batch_size: 2048  # 批处理大小
  epochs: 300  # 总训练轮次
  learning_rate: 0.001  # 学习率（单模型模式）
  optimizer: 'adam'  # 优化器：'adam' Adam，'sgd' SGD，'rmsprop' RMSProp
  loss_function: 'mse'  # 损失函数：'mse' 均方误差，'mae' 平均绝对误差
  
  # 📌 早停机制（防止过拟合）
  early_stopping: True  # 是否启用早停
  patience: 10  # 早停耐心值：验证损失不改进的轮数阈值
  
  # 📌 学习率衰减策略
  lr_schedule: True  # 是否启用学习率衰减
  lr_decay_factor: 0.5  # 学习率衰减因子（新学习率 = 旧学习率 × 因子）
  lr_decay_patience: 5  # 衰减耐心值：多少轮后触发衰减
  
  # 📌 模型检查点保存设置
  save_best_only: True  # 是否仅保存最优模型
  save_frequency: 5  # 保存频率：每N个epoch保存一次

  # 📌 并行模式的优化器设置
  parallel:
    seq2point:  # CNN模型的优化器配置
      learning_rate: 0.001  # CNN学习率
      optimizer: 'adam'  # CNN优化器
    transformer:  # Transformer模型的优化器配置
      learning_rate: 0.001  # Transformer学习率
      optimizer: 'adam'  # Transformer优化器
  
# ============================================================================
# ✅ 验证设置
# ============================================================================
validation:
  val_split: 0.15  # 验证集比例（从训练集中分离20%作为验证集）
  shuffle: True  # 是否打乱数据顺序
  
# ============================================================================
# 📈 评估设置
# ============================================================================
evaluation:
  metrics: ['mae', 'mse', 'rmse', 'accuracy']  # 评估指标列表
  threshold: 10  # 开关状态功率阈值（W）：功率高于此值判定为"开"
  
# ============================================================================
# 📝 日志设置
# ============================================================================
logging:
  log_dir: 'logs'  # 日志输出目录
  tensorboard: True  # 是否使用TensorBoard可视化
  save_predictions: True  # 是否保存预测结果
  
# ============================================================================
# 💻 设备设置
# ============================================================================
device:
  gpu: True  # 是否使用GPU加速
  gpu_id: 0  # GPU设备ID（当有多个GPU时指定使用的GPU序号）
  num_workers: 4  # 数据加载的工作进程数
  
# ============================================================================
# 🎲 随机种子
# ============================================================================
seed: 42  # 随机数种子（用于复现结果）
