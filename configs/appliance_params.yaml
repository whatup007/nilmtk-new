# ============================================================================
# ⚙️ 电器设备参数配置
# ============================================================================
# 用于NILM任务的各种家电设备的特定参数配置
# 这些参数用于模型训练、评估和设备识别

# 📌 冰箱（Fridge）
# 特点：间歇运行，压缩机周期启/停
fridge:
  max_power: 300  # 最大功率（W）：压缩机满载时的最大功率消耗
  threshold: 50  # 开关阈值（W）：功率高于此值判定为运行状态
  min_on_duration: 60  # 最小开启时长（秒）：压缩机单次启动的最短时间
  min_off_duration: 12  # 最小关闭时长（秒）：压缩机单次停止的最短时间

# 📌 微波炉（Microwave）
# 特点：高功率、工作周期短
microwave:
  max_power: 3000  # 最大功率（W）：加热元件全功率消耗
  threshold: 200  # 开关阈值（W）：判定微波炉启动的功率阈值
  min_on_duration: 12  # 最小开启时长（秒）：通常使用较短
  min_off_duration: 30  # 最小关闭时长（秒）：每次使用间隔

# 📌 洗碗机（Dishwasher）
# 特点：工作周期长、功率变化复杂
dishwasher:
  max_power: 2500  # 最大功率（W）：加热和电机同时启动时
  threshold: 10  # 开关阈值（W）：设置较低，便于捕捉整个工作周期
  min_on_duration: 1800  # 最小开启时长（秒）：完整洗涤周期约30分钟
  min_off_duration: 1800  # 最小关闭时长（秒）：使用间隔通常较长

# 📌 洗衣机（Washing Machine）
# 特点：工作周期长、阶段性功率变化
washing_machine:
  max_power: 2500  # 最大功率（W）：加热和转速最高时
  threshold: 20  # 开关阈值（W）：设置较低以捕捉完整周期
  min_on_duration: 1800  # 最小开启时长（秒）：完整洗涤周期约30分钟
  min_off_duration: 160  # 最小关闭时长（秒）：两个洗涤周期间隔

# 📌 电热水壶（Kettle）
# 特点：高功率、工作周期短、快速启停
kettle:
  max_power: 3100  # 最大功率（W）：加热元件全功率
  threshold: 2000  # 开关阈值（W）：设置较高，易于准确识别频繁启停
  min_on_duration: 12  # 最小开启时长（秒）：通常使用时间短
  min_off_duration: 0  # 最小关闭时长（秒）：可以连续使用
